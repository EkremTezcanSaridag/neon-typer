<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Typer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>


    <div class="wrapper">
        <div class="status">
            <div>
                <p class="score">Skor: <span id="current-score">0</span></p>
            </div>
            <div>
                <p class="lives">Can:
                <div id="can">3</div>
                </p>

            </div>

            <div>
                <p class="combo">Kombo: <span id="current-combo">0</span></p>
            </div>
        </div>




        <div id="game-board">

            <div id="sure-goster-wrapper" style="display:none;">
                <p class="sure-display">Süre: <span id="sure-goster">0</span></p>
            </div>
            <div id="start-screen">
                <h1>NEON TYPER</h1>
                <p>başlamak için butona basınız !</p>

                <button class="klasik">Klasik Mod</button>
                <button class="hizmodu">Hız Modu</button>

                <div class="suresecim">
                    <button class="sure-btn active" data-sure="30">30 SN</button>
                    <button class="sure-btn" data-sure="60">1 DK</button>
                    <button class="sure-btn" data-sure="120">2 DK</button>
                </div>


                <button id="start-btn">OYUNA BAŞLA</button>


                <div class="zorluk-secim">
                    <button class="zorluk-btn active" data-speed="2" data-spawn="3000">KOLAY</button>
                    <button class="zorluk-btn" data-speed="4" data-spawn="2000">ORTA</button>
                    <button class="zorluk-btn" data-speed="7" data-spawn="1200">ZOR</button>
                </div>

            </div>

            <div class="gameoverscreen">
                <h1>OYUN BİTTİ</h1>
                <p>Final Skorunuz : <span id="final-score">0</span></p>
                <button id="restart-btn">YENİDEN BAŞLA</button>
            </div>


            <div id="countdown" style="display:none;">
                <span id="countdown-sayi"></span>
            </div>

        </div>

        <div>
            <input type="text" id="input-area" autofocus placeholder="...">
        </div>
    </div>

    <div id="settings">

        <i class="fa-solid fa-gears"></i>

    </div>


    <div class="settingspanel">
        <h2>AYARLAR</h2>


        <div class="settingrow">
            <span>SES :</span>
            <button class="sound-toggle">
                <i class="fa-solid fa-volume-high"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>


    <audio src="sounds/shoot.mp3" id="shoot"></audio>
    <audio src="sounds/gameover.mp3" id="gameover"></audio>
    <audio src="sounds/bonus.mp3" id="bonus"></audio>


</body>

</html>
