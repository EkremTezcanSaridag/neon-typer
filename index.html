<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Typer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>
    

    <div class="wrapper">
        <div class="status">
            <div>
                <p class="score">Skor: <span id="current-score">0</span></p>
            </div>
            <div>
                <p class="lives">Can: <div id="can">3</div></p>
            </div>
        </div>



        <div id="game-board">

            <div id="start-screen">
                <h1>NEON TYPER</h1>
                <p>başlamak için butona basınız !</p>
                <button id="start-btn">OYUNA BAŞLA</button>

            </div>

            <div class="gameoverscreen">
                <h1>OYUN BİTTİ</h1>
                <p>Final Skorunuz : <span id="final-score">0</span></p>
                <button id="restart-btn">YENİDEN BAŞLA</button>
            </div>

        </div>

        <div>
            <input type="text" id="input-area" autofocus placeholder="...">
        </div>
    </div>

    <div id="settings">

        <i class="fa-solid fa-gears"></i>

    </div>


    <div class="settingspanel">
        <h2>AYARLAR</h2>
        <span class="zorluksecim">Zorluk Seviyesi: </span>

        <div class="farklizorluk">
            <div class="farklibut " data-speed="2">KOLAY</div>
            <div class="farklibut" data-speed="4">ORTA</div>
            <div class="farklibut" data-speed="7" >ZOR</div>
        </div>

        <div class="settingrow">
            <span>SES :</span>
            <button class="sound-toggle">
                <i class="fa-solid fa-volume-high"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>


    <audio src="sounds/shoot.mp3" id="shoot"></audio>
    <audio src="sounds/gameover.mp3" id="gameover"></audio>


</body>

</html>
