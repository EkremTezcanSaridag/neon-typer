<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Typer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>
    

    <div class="wrapper">
        <div class="status">
            <div>
                <p class="score">Skor: <span id="current-score">0</span></p>
            </div>
            <div>
                <p class="lives">Can: <div id="can">3</div></p>
            </div>
        </div>



        <div id="game-board">

            <div id="start-screen">
                <h1>NEON TYPER</h1>
                <p>başlamak için butona basınız !</p>
                <button id="start-btn">OYUNA BAŞLA</button>

            </div>

        </div>

        <div>
            <input type="text" id="input-area" autofocus placeholder="...">
        </div>
    </div>

    <div id="settings">

        <i class="fa-solid fa-gears"></i>

    </div>

    <script src="script.js"></script>


    <audio src="sounds/shoot.mp3" id="shoot"></audio>
    <audio src="sounds/gameover.mp3" id="gameover"></audio>


</body>

</html>
